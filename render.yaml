# Configuration de déploiement Render
services:
  - type: web
    name: couture-app
    runtime: php
    region: frankfurt
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan migrate --force
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --port=$PORT
    envVars:
      - key: APP_NAME
        value: CoutureApp
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://couture-app.onrender.com
      # CORRECTIF : Utilisation du pilote MySQL comme demandé (les identifiants DB_HOST, DB_PASSWORD, etc. sont configurés sur le tableau de bord Render)
      - key: DB_CONNECTION
        value: mysql
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_LEVEL
        value: error
      - key: MAIL_MAILER
        value: smtp