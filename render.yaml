services:
  - type: web
    name: couture-app
    runtime: php
    region: frankfurt
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan migrate --force
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --port=$PORT
    envVars:
      - key: APP_NAME
        value: CoutureApp
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://couture-app.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: couture-app-db
          property: host
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        fromDatabase:
          name: couture-app-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: couture-app-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: couture-app-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_LEVEL
        value: error
      - key: MAIL_MAILER
        value: smtp
      - key: APP_THEME_MODE
        value: client

databases:
  - name: couture-app-db
    databaseName: couture_app
    region: frankfurt
    plan: free
    ipAllowList: []
